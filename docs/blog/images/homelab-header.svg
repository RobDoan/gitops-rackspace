<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>
  
  <!-- Subtle Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    
    <linearGradient id="coreGradient" x1="600" y1="200" x2="600" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Background Data Streams -->
  <path d="M100 0V630M300 0V630M500 0V630M700 0V630M900 0V630M1100 0V630" stroke="#0f172a" stroke-width="2"/>
  <path d="M0 100H1200M0 300H1200M0 500H1200" stroke="#0f172a" stroke-width="2"/>

  <!-- "The Cloud" top representation -->
  <path d="M400 50 Q600 20 800 50" stroke="#1e293b" stroke-width="2" fill="none"/>
  <circle cx="600" cy="40" r="5" fill="#1e293b"/>
  
  <!-- Connections from Cloud to Core -->
  <path d="M600 50V250" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="5 5" opacity="0.3"/>
  <path d="M400 50L550 250" stroke="#a855f7" stroke-width="1" stroke-dasharray="5 5" opacity="0.2"/>
  <path d="M800 50L650 250" stroke="#a855f7" stroke-width="1" stroke-dasharray="5 5" opacity="0.2"/>

  <!-- The "Core" - Minisforum stylized -->
  <g filter="url(#glow)">
    <!-- Chassis -->
    <rect x="520" y="250" width="160" height="180" rx="12" fill="#0f172a" stroke="url(#coreGradient)" stroke-width="3"/>
    <!-- Internal components glow -->
    <rect x="540" y="270" width="120" height="100" rx="8" fill="url(#coreGradient)" opacity="0.1"/>
    <!-- CPU/Core highlight -->
    <rect x="580" y="300" width="40" height="40" rx="4" fill="url(#coreGradient)"/>
    <!-- Front Panel details -->
    <circle cx="550" cy="400" r="4" fill="#2dd4bf"/>
    <circle cx="570" cy="400" r="4" fill="#1e293b"/>
    <rect x="630" y="395" width="20" height="8" rx="2" fill="#a855f7" opacity="0.5"/>
  </g>

  <!-- Nodes: Jarvis, Edith, Karen -->
  <!-- Jarvis -->
  <g transform="translate(400, 480)">
    <circle r="30" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
    <text y="50" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-weight="bold" font-size="14">JARVIS</text>
    <path d="M0 -30V-80" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <circle r="4" fill="#2dd4bf"/>
  </g>
  
  <!-- Edith -->
  <g transform="translate(600, 520)">
    <circle r="30" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text y="50" text-anchor="middle" fill="#a855f7" font-family="monospace" font-weight="bold" font-size="14">EDITH</text>
    <path d="M0 -30V-70" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <circle r="4" fill="#a855f7"/>
  </g>

  <!-- Karen -->
  <g transform="translate(800, 480)">
    <circle r="30" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
    <text y="50" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-weight="bold" font-size="14">KAREN</text>
    <path d="M0 -30V-80" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <circle r="4" fill="#2dd4bf"/>
  </g>

  <!-- Connection Lines from Core to Nodes -->
  <path d="M540 430L400 480" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>
  <path d="M600 430L600 520" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <path d="M660 430L800 480" stroke="#2dd4bf" stroke-width="1" opacity="0.3"/>

  <!-- Text elements -->
  <text x="600" y="150" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="900" font-size="48" letter-spacing="2">FROM CLOUD TO CORE</text>
  <text x="600" y="190" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-weight="normal" font-size="18" letter-spacing="4">ABSOLUTE BEAST HOMELAB</text>
  
  <!-- Tech badges -->
  <g transform="translate(1000, 50)">
    <rect width="120" height="30" rx="4" fill="#0f172a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="12">KUBERNETES</text>
  </g>
  <g transform="translate(1000, 90)">
    <rect width="120" height="30" rx="4" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="12">PROXMOX</text>
  </g>

  <!-- Decorative technical lines -->
  <path d="M50 50H200M50 50V200" stroke="#1e293b" stroke-width="1"/>
  <path d="M1150 580H1000M1150 580V430" stroke="#1e293b" stroke-width="1"/>
</svg>
