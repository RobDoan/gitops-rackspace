apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qdrant-secrets
  namespace: qdrant
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: qdrant-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: qdrant
        property: api_key
