apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: qdrant
      version: ">=0.9.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    persistence:
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      storageClassName: ssd
    extraEnvVars:
      - name: QDRANT__SERVICE__API_KEY
        valueFrom:
          secretKeyRef:
            name: qdrant-secrets
            key: api-key
