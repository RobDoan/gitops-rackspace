apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack
    creationPolicy: Owner
  data:
    - secretKey: default
      remoteRef:
        key: observability/slack-webhook
        property: default
    - secretKey: critical
      remoteRef:
        key: observability/slack-webhook
        property: critical
