apiVersion: batch/v1
kind: Job
metadata:
  name: loki-bucket-init
  namespace: monitoring
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-05T11-29-45Z
          env:
            # Order matters: K8s $(VAR_NAME) expansion only references vars
            # declared earlier in the env list. Declaring S3_ACCESS_KEY and
            # S3_SECRET_KEY before MC_HOST_local so the expansion resolves.
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-s3
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-s3
                  key: secret-key
            - name: MC_HOST_local
              value: "http://$(S3_ACCESS_KEY):$(S3_SECRET_KEY)@minio.minio.svc.cluster.local:9000"
          command:
            - sh
            - -c
            - |
              mc mb --ignore-existing local/loki-chunks
              mc mb --ignore-existing local/loki-ruler
              mc mb --ignore-existing local/loki-admin
