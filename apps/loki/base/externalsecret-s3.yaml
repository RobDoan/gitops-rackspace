apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: loki-s3
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: observability/loki-s3
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: observability/loki-s3
        property: secret-key
