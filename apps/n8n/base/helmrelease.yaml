apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: n8n
      version: "2.0.1"
      sourceRef:
        kind: HelmRepository
        name: 8gears
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    main:
      persistence:
        enabled: true
        type: dynamic
        size: 5Gi
      config:
        generic:
          timezone: "UTC"
        database:
          type: sqlite
      extraEnv:
        WEBHOOK_URL:
          value: "https://n8n.example.com/"
        N8N_EDITOR_BASE_URL:
          value: "https://n8n.example.com/"
        N8N_BLOCK_ENV_ACCESS_IN_NODE:
          value: "false"
        N8N_BASIC_AUTH_ACTIVE:
          value: "true"
        THE_ROYAL_DISPATCH_API_URL:
          value: "http://backend.royal-dispatch.svc.cluster.local:8000"
        N8N_ENCRYPTION_KEY:
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: N8N_ENCRYPTION_KEY
        TELEGRAM_BOT_TOKEN:
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: TELEGRAM_BOT_TOKEN
        N8N_SHARED_SECRET:
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: N8N_SHARED_SECRET
