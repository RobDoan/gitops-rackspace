apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: n8n
      version: ">=0.1.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: 8gears
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 5Gi
    config:
      generic:
        timezone: "UTC"
      database:
        type: sqlite
    extraEnv:
      WEBHOOK_URL: "https://n8n.example.com/"
      N8N_EDITOR_BASE_URL: "https://n8n.example.com/"
    extraEnvSecrets:
      N8N_ENCRYPTION_KEY:
        name: n8n-secrets
        key: encryption-key
