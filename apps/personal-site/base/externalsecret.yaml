apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: personal-site-secrets
  namespace: personal-site
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: personal-site-secrets
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: personal-site/api
        property: openai-api-key
    - secretKey: QDRANT_API_KEY
      remoteRef:
        key: personal-site/api
        property: qdrant-api-key
    - secretKey: TURNSTILE_SECRET
      remoteRef:
        key: personal-site/api
        property: turnstile-secret
    - secretKey: IP_HASH_SALT
      remoteRef:
        key: personal-site/api
        property: ip-hash-salt
