apiVersion: v1
kind: ConfigMap
metadata:
  name: personal-site-config
  namespace: personal-site
data:
  NODE_ENV: production
  LOG_LEVEL: info
  OPENAI_MODEL_ANSWER: gpt-4.1-mini
  OPENAI_MODEL_CLASSIFIER: gpt-5-nano
  OPENAI_MODEL_EMBEDDING: text-embedding-3-small
  QDRANT_URL: http://qdrant.qdrant.svc.cluster.local:6333
  QDRANT_COLLECTION: personal-site
  # Public Turnstile site key — safe in git. Replace with real key before deploy.
  TURNSTILE_SITE_KEY: "0x4AAAAAADCRwNEy60IsUood"
