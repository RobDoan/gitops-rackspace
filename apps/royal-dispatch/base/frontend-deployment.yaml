apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: royal-dispatch
  labels:
    app: royal-dispatch
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: royal-dispatch
      component: frontend
  template:
    metadata:
      labels:
        app: royal-dispatch
        component: frontend
    spec:
      containers:
        - name: frontend
          image: quydoan/royal-dispatch-frontend
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: royal-dispatch-config
                  key: NEXT_PUBLIC_API_URL
            - name: INTERNAL_API_URL
              value: "http://backend.royal-dispatch.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
