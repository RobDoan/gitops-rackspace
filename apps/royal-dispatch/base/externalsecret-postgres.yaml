apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: royal-dispatch-postgres
  namespace: royal-dispatch
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: royal-dispatch-postgres
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: postgres
        property: password
