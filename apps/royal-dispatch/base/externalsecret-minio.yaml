apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: royal-dispatch-minio
  namespace: royal-dispatch
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: royal-dispatch-minio
    creationPolicy: Owner
  data:
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: minio
        property: root_user
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: minio
        property: root_password
