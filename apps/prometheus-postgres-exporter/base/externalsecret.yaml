apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-exporter
  namespace: postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-exporter
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: postgres/exporter-password
        property: password
