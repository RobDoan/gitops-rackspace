apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: grafana
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 5Gi
    admin:
      existingSecret: grafana-secrets
      userKey: admin-user
      passwordKey: admin-password
    grafana.ini:
      server:
        root_url: "https://grafana.example.com"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        # searchNamespace null = own namespace (grafana), which is where our ConfigMap lives
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: Prometheus
            type: prometheus
            access: proxy
            url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
            editable: false
          - name: Loki
            uid: Loki
            type: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
            editable: false
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        k8s-cluster:
          gnetId: 315
          revision: 3
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        kube-state:
          gnetId: 13332
          revision: 12
          datasource: Prometheus
        ingress-nginx:
          gnetId: 9614
          revision: 1
          datasource: Prometheus
        postgres-exporter:
          gnetId: 9628
          revision: 7
          datasource: Prometheus
        loki-logs:
          gnetId: 13639
          revision: 2
          datasource: Loki
