apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: grafana
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    persistence:
      enabled: true
      size: 2Gi
      storageClassName: ssd
    admin:
      existingSecret: grafana-secrets
      userKey: admin-user
      passwordKey: admin-password
    grafana.ini:
      server:
        root_url: "https://grafana.quybits.com"
