apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [minio]
  selector:
    matchLabels:
      app: minio
      # monitoring=true is set on the main API service only; the minio-console
      # service (port 9001) lacks this label so this narrows us away from it.
      monitoring: "true"
  endpoints:
    - port: http
      path: /minio/v2/metrics/cluster
      interval: 30s
      scheme: http
