apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: royal-dispatch-backend
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [royal-dispatch]
  selector:
    matchLabels:
      app: royal-dispatch
      component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
