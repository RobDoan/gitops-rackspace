apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: qdrant
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [qdrant]
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
