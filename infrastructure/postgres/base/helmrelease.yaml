apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: postgresql
      version: "16.7.25"
      sourceRef:
        kind: HelmRepository
        name: bitnami-postgresql
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    auth:
      username: royal
      database: royal_dispatch
      existingSecret: postgres-secrets
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
    primary:
      persistence:
        enabled: true
        size: 10Gi
