apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: vault
      version: ">=0.27.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      enabled: true
    server:
      affinity: ""
      ha:
        enabled: false
      standalone:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address     = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path    = "/vault/data"
            node_id = "vault-0"
          }
          service_registration "kubernetes" {}
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: ssd
        accessMode: ReadWriteOnce
    ui:
      enabled: true
      serviceType: ClusterIP
    injector:
      enabled: false
