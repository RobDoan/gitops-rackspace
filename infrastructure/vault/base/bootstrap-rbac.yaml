apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-bootstrap
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-bootstrap
  namespace: external-secrets
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: vault
roleRef:
  kind: Role
  name: vault-bootstrap
  apiGroup: rbac.authorization.k8s.io
