apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api
  namespace: minio
spec:
  tls:
    - hosts:
        - minio.homelander.local
      secretName: minio-api-tls
  rules:
    - host: minio.homelander.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: minio
spec:
  tls:
    - hosts:
        - minio-console.homelander.local
      secretName: minio-console-tls
  rules:
    - host: minio-console.homelander.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
