apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: minio
      version: ">=14.0.0 <16.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami-minio
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    auth:
      existingSecret: minio-secrets
    defaultBuckets: "royal-audio"
    persistence:
      enabled: true
      size: 20Gi
