  tls:
    - hosts:
        - minio-console.example.com
      secretName: minio-console-tls
  rules:
    - host: minio-console.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
