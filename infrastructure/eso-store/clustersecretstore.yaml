apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        appRole:
          path: "approle"
          roleId:
            key: roleId
            name: vault-approle-credentials
            namespace: external-secrets
          secretRef:
            key: secretId
            name: vault-approle-credentials
            namespace: external-secrets
