apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.9.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    controller:
      service:
        type: LoadBalancer
      ingressClassResource:
        default: true
