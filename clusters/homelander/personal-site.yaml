apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: personal-site
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./apps/personal-site/overlays/homelander
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: postgres
    - name: qdrant
    - name: cert-manager-issuers
    - name: ingress-nginx
    - name: external-secrets
    - name: cloudflared
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: web
      namespace: personal-site
